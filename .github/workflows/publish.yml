name: Publish

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
      - run: pnpm generate:check
      - run: pnpm test
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm package:inspect

      - name: Verify release tag matches package version
        run: |
          node -e "const pkg = require('./package.json'); const tag = process.env.GITHUB_REF_NAME || ''; const expected = `v${pkg.version}`; if (tag !== expected) { console.error(`Release tag ${tag} does not match package version ${pkg.version}; expected ${expected}.`); process.exit(1); }"

      - run: npm publish --provenance --access public
